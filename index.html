<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee & Project Management Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 1. НОВА КНОПКА (ДЛЯ МОБІЛОК) -->
    <!-- Вона з'явиться тільки на екранах < 768px завдяки нашому CSS -->
    <button class="menu-toggle" id="menuToggle">
        <span class="bar"></span>
        <span class="bar"></span>
    </button>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <!-- 2. СТАРА КНОПКА (ДЛЯ ДЕСКТОПА) -->
                <button id="toggleSidebar" class="icon-btn">
                    <i class="arrow-icon"></i> 
                </button>
            </div>
            
            <div class="sidebar-content">
                <div class="period-selectors">
                    <label for="monthSelect">Month</label>
                    <select id="monthSelect"></select>
                    
                    <label for="yearSelect">Year</label>
                    <select id="yearSelect"></select>
                </div>
                
                <nav class="nav-menu">
                    <button class="nav-link active" data-tab="projects">Projects</button>
                    <button class="nav-link" data-tab="employees">Employees</button>
                </nav>

                <button id="seedDataBtn" class="btn-secondary">Seed Data</button>
            </div>
        </aside>

        <main class="main-content">
            
            <section id="projects-page" class="page">
                <div class="page-header">
                    <h1>Projects Management</h1>
                    <button class="btn-primary" id="openAddProject">Add Project</button>
                </div>

                <div class="filters-container" id="project-filters"></div>
                
                <div class="table-wrapper">
                    <div id="projects-table-container"></div>
                </div>

                <div id="total-revenue-display" class="financial-summary">
                    </div>
            </section>

            <section id="employees-page" class="page" style="display: none;">
                <div class="page-header">
                    <h1>Employees Database</h1>
                    <button class="btn-primary" id="openAddEmployee">Add Employee</button>
                </div>

                <div class="filters-container" id="employee-filters"></div>

                <div class="table-wrapper">
                    <div id="employees-table-container"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <div id="overlay" class="overlay"></div>
    
    <div id="side-panel" class="side-panel"></div>

    <div id="modal" class="modal"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
